# Пример структуры, заполняется аналитиком под конкретного клиента перед
# первым запуском — пустой список entries допустим, но тогда фильтрация не
# работает и это будет видно в manifest.
#
# Каждая запись — подстрока (lower-case), по которой Wordstat-фраза
# отбраковывается или помечается как нецелевая:
#   scope: junk    — вырезается из gap_candidates И seasonality_candidates
#                    (мусор: конкуренты, чужой регион, явно нерелевантное).
#   scope: general — вырезается только из gap_candidates (широкий инфозапрос
#                    без коммерческого намерения, но валидный для сезонности).
# reason обязателен — почему это стоп-слово, не полагаться на память.
# added_by / added_at — аналитик, не система; фиксирует, кто и когда принял
# решение по фразе.

entries:
  - phrase: "конкурент-бренд"
    scope: "junk"
    reason: "конкурент — прямое упоминание чужого бренда"
    added_by: ""
    added_at: ""

  - phrase: "бесплатно"
    scope: "junk"
    reason: "нерелевантная категория — ищут бесплатный вариант, не покупку"
    added_by: ""
    added_at: ""

  - phrase: "своими руками"
    scope: "junk"
    reason: "инфозапрос без коммерции — DIY, не спрос на услугу/товар"
    added_by: ""
    added_at: ""

  - phrase: "что такое"
    scope: "general"
    reason: "широкий информационный запрос — валиден для сезонности, но не для gap-анализа посадочных"
    added_by: ""
    added_at: ""

  - phrase: "отзывы"
    scope: "general"
    reason: "запрос на репутацию/отзывы, не на покупку — не приоритет для gap_candidates"
    added_by: ""
    added_at: ""
