# Ручное тестирование форм заявки/бронирования.
# Заполняется аналитиком после прохождения формы от начала до конца (golden path).
# Используется в проверках C01–C25 (CRO, сайт и воронка до обращения).
# Выводы получают уверенность MED по умолчанию, если не указано иное.

meta:
  tested_at: ""           # дата тестирования (YYYY-MM-DD)
  tester: ""              # кто проводил тест (имя или роль)
  device: ""              # desktop | mobile | both
  browser: ""             # Chrome | Safari | Firefox | другое
  form_url: ""            # URL страницы с формой
  form_type: ""           # booking | lead | callback | другое

patterns: []
# Каждый элемент — одна проблема или наблюдение на шаге формы:
# [{
#   step: "",              # шаг формы: напр. "выбор дат" | "ввод телефона" | "подтверждение"
#   field: "",             # поле, если проблема в конкретном поле (напр. "дата заезда")
#   issue: "",             # описание проблемы (напр. "нет маски ввода, формат не ясен")
#   severity: "",          # critical | major | minor
#   url: "",               # URL шага, если форма многостраничная
#   screenshot_ref: "",    # ссылка/имя скриншота (опционально)
#   note: ""               # дополнительное наблюдение
# }]

conclusions: []    # итоговые выводы: что мешает конверсии, что работает хорошо
# [{conclusion: "", confidence: "MED", topic: ""}]
