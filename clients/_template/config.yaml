# Конфиг клиента. Копируется в clients/<name>/config.yaml и заполняется.
# ВСЁ клиентское — здесь. Скрипты код не правят (принцип 1). Секреты — в .env.

client:
  name: ""            # имя клиента (для отчёта)
  niche: ""           # ниша — используется в формулировках находок
  geo: ""             # регион(ы) продвижения

sources:              # что ЗАЯВЛЕНО; intake проверит фактическую доступность
  metrika:   {enabled: true,  counter_id: null}
  direct:
    enabled: false
    client_login: null
    attribution_type: ""  # обязательно явно при использовании целей: LSC | LC | FC | LYDC
    macro_goals: []       # [{id: 12345678, name: "Отправка формы брони"}]
  webmaster:
    enabled: false
    host_id: null
    mode: "manual"        # api | manual — сейчас manual, переключаемо без правок кода
    manual_export_dir: "inputs/manual_exports/webmaster"
    manual_export_file: "webmaster_export.csv"   # единственный wide-файл в каталоге
    # Маппинг canonical -> заголовок в CSV wide-экспорта (Query | Url | YYYY-MM_shows | ...).
    # Настраиваются только имена колонок запроса и страницы; суффиксы метрик (_shows,
    # _clicks, _position, _ctr, _demand) фиксированы форматом экспорта.
    # Дефолты: query="Query", page="Url". Пусто = использовать дефолты.
    column_map: {}
    # Оставлено для обратной совместимости; логика degrade/aggregate не применяется,
    # т.к. wide-формат содержит колонку page.
    manual_no_page_breakdown_policy: "degrade"
  gsc:
    enabled: false
    site_url: null
    mode: "manual"        # api | manual
    manual_export_dir: "inputs/manual_exports/gsc"
    credentials_path: null   # используется только если mode: api
    # canonical -> заголовок в CSV ручного экспорта (папки YYYY-MM/Запросы.csv и т.д.).
    # Менять только если у клиента другой язык интерфейса GSC.
    # Буква «К» в «Клики» — кириллическая (U+041A), не ASCII K.
    column_map:
      query:        "Популярные запросы"
      page:         "Популярные страницы"
      device:       "Устройство"
      country:      "Страна"
      date:         "Дата"
      clicks:       "Kлики"             # ASCII K (U+004B) + Cyrillic "лики"
      impressions:  "Показы"
      ctr:          "CTR"
      position:     "Позиция"
      filter_key:   "Фильтр"
      filter_value: "Значение"
  wordstat:
    enabled: false
    regions: []        # GeoID регионов Яндекса; пусто = вся Россия (напр. [10231] — Приморье)
    devices: ["all"]   # устройства Wordstat API: all | desktop | phone | tablet
    folder_id: null    # ID папки Yandex Cloud для WORDSTAT_API_KEY; обязателен для
                        # Yandex Cloud Search API v2 (folderId в теле каждого запроса)
  crux:                 # полевые Core Web Vitals из Chrome UX Report API
    enabled: true
    api_key_env: "CRUX_API_KEY"
    origin: null        # origin сайта, напр. "https://example.com" (иначе берётся gsc.site_url)
    key_urls: []        # до 5 ключевых посадочных URL для точечной проверки CWV
  crm_csv:   {enabled: false, path: "inputs/crm_export.csv"}

goals:                # маппинг id целей Метрики на сущности методологии
  form_open_goal_ids: []
  form_submit_goal_ids: []
  call_click_goal_ids: []
  messenger_goal_ids: []

costs_manual:         # для клиентов без Директа или с ручными фиксами расходов
  agency_fee_rub_month: 0     # ведение контекста, руб/мес
  seo_fee_rub_month: 0        # ведение SEO, руб/мес
  other: []                   # [{name: "", rub_month: 0, source_tag: ""}]

# ── Окно анализа ───────────────────────────────────────────────────────────
# mode: explicit      — задаёшь точные даты начала и конца периода.
#                       date_from — обязательно 1-е число месяца (напр. 2025-07-01).
#                       date_to   — обязательно последний день месяца (напр. 2026-06-30)
#                                   ИЛИ строка "today": текущая дата, месяц будет
#                                   помечен как неполный (current_month_is_partial: true
#                                   в manifest.json).
# mode: months_back   — скользящее окно: months_back полных месяцев до конца прошлого
#                       месяца (дату вычисляет intake автоматически).
data_window:
  mode: "explicit"        # explicit | months_back
  date_from: "2025-07-01" # только 1-е число месяца (обязательно при mode: explicit)
  date_to: "2026-06-30"   # последний день месяца ИЛИ строка "today"
  months_back: null       # используется только при mode: months_back (напр. 12)

# Сравнение с предыдущим периодом той же длины.
# При enabled: true intake вычислит второе окно со сдвигом назад на offset_months
# и запишет оба окна (primary_window, compare_window) в data/raw/manifest.json.
compare_previous_period:
  enabled: false
  offset_months: 12       # 12 = год к году

brand_terms: []       # список вариантов написания бренда (разные формы, транслит);
                       # используется compute-классификацией is_brand = regex по brand_terms

crux: {enabled: true}

crawl_seed_urls: []   # явные URL для обхода (высший приоритет); напр. ["/", "/booking", "/faq"]

crawl:
  max_urls: 30        # потолок очереди кролера; при превышении — хвост отбрасывается с кавет в манифесте

wordstat_seeds: []    # маски запросов для Wordstat, напр. ["аренда авто", "прокат машин"]
# Регион/устройства для Wordstat теперь в sources.wordstat.regions/devices (WS-1).
top_n_gap: 15          # топ-N ассоциированных запросов Wordstat для gap-анализа (S07)
                       # после фильтра wordstat_stopwords.yaml (junk+general вырезаются)
top_n_seasonality: 10  # топ-K запросов для сезонности (S05/S06/S26) — только junk-фильтр,
                       # general НЕ вырезается; seed-маска добавляется всегда, даже вне топа

crm_csv:              # правила разбора ручной выгрузки CRM (sources.crm_csv.path)
  # canonical -> заголовок в CSV. Каноничные: lead_date, source, phone_or_id,
  # status, amount_rub, is_new_client. Пусто = заголовки совпадают с каноничными.
  column_map: {}      # напр. {lead_date: "Дата", phone_or_id: "Телефон", status: "Статус"}
  status_map: {}      # сырой статус (нижний регистр) -> won|lost|in_progress|...
                      # напр. {"успешно": "won", "отказ": "lost", "в работе": "in_progress"}
  date_formats: []    # доп. форматы дат (strptime); пусто = встроенный набор
  delimiter: ""       # разделитель CSV; пусто = автоопределение (';' у RU-Excel)
  hash_salt: ""       # соль для хэша телефонов; НЕ менять — ломает будущую склейку
