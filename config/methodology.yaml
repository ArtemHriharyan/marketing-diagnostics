# Реестр проверок методологии диагностики (схема ID каталога угроз v2).
#
# Рабочий ID — буквенно-числовой из каталога (D/A/T/C/S + номер). Старый
# числовой ID предыдущей методологии хранится в legacy_id ТОЛЬКО для сверки с
# отчётом Pognali v2 и не участвует в compute/degradation/analyze. Соответствие
# блоков и подробности схемы — в CLAUDE.md, раздел «Схема ID проверок».
#
# Формат записи:
#   - id: "A07"                      рабочий ID (каталог v2)
#     legacy_id: "2.2"               старый числовой ID или null
#     block: 1                       0=D 1=A 2=T 3=C 4=S
#     name: "..."                    краткая формулировка угрозы
#     requires: [costs]              канонические таблицы, без которых нельзя
#     optional: [site_crawl]         обогащающие таблицы (на runnable не влияют)
#     outputs: [a07]                 артефакты в data/metrics/
#     type_default: "A"              A|B|Q|A+B|A+Q — уровень проверяемости
#     type_downgrade_if: "..."       условие пост-хок понижения типа или null
#     type_downgraded: "B"           тип после понижения или null;
#                                    "permanent_LOW" — особое значение: ограничение
#                                    источника ПОСТОЯННОЕ (не тарифная/временная
#                                    деградация конкретного прогона) — захардкожено
#                                    напрямую, БЕЗ участия type_downgrade_if (см. ниже
#                                    и CLAUDE.md, раздел «Схема ID проверок»).
#     downgrade_reason: "..."        человекочитаемая причина понижения (опционально,
#                                    заполняется вместе с type_downgraded, когда
#                                    ограничение зафиксировано фактом, а не гипотезой)
#
# Уровни проверяемости (type): A — автоматически из выгрузок; B — ручная проверка
# в интерфейсе/на сайте/в Вебвизоре/замером; Q — требует факта/документа клиента;
# A+B, A+Q — комбинации.
#
# type_downgrade_if читает булевы флаги из data/raw/*/manifest.json (например
# campaign_report_has_lost_impression_share). Если условие истинно, слой compute
# берёт type_downgraded, иначе type_default. Отсутствующий флаг трактуется как
# false. Карту деградации (type_effective, source_modes, confidence_cap) строит
# src/pipeline/degradation.py.
#
# Исключение — type_downgraded: "permanent_LOW" (напр. D11): это ограничение
# ПОСТОЯННОЕ и не зависит от manifest-флага конкретного прогона, поэтому
# type_downgrade_if для таких записей остаётся null — понижение читается
# напрямую по type_downgraded, а не вычисляется условно.
#
# Канонические таблицы, на которые ссылаются requires/optional:
#   visits             — визиты Метрики (Logs API)
#   costs              — расходы (Директ + ручные из config.costs_manual)
#   direct_queries     — поисковые запросы Директа
#   campaign_strategies— стратегии/цели оптимизации кампаний Директа
#   seo_queries        — поисковые запросы SEO (Вебмастер / GSC; mode: api|manual)
#   wordstat           — частотность спроса Wordstat
#   crux               — полевые Core Web Vitals из Chrome UX Report
#   site_crawl         — обход сайта / ручная техническая проверка страниц
#   crm                — выгрузка CRM (сделки/лиды)
#   client_answers     — анкета установочного созвона (inputs/client_answers.yaml)
#   webvisor_findings  — наблюдения аналитика из Вебвизора (inputs/…)
#   degradation_report — отчёт о непокрытых проверках (мета-вход)

