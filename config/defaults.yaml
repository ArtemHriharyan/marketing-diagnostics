# Общие пороги и окна пайплайна. Клиентский config.yaml может переопределять
# отдельные значения (например, data_window). Всё, что специфично для клиента,
# живёт в clients/<name>/config.yaml, здесь — только дефолты методологии.

data_window_months: 12          # окно анализа по умолчанию

utm_undefined_threshold: 0.25   # доля визитов с меткой "Не определено":
                                # <25%  -> списываем на рекламу (шум приемлем)
                                # >=25% -> флаг "источник не определён наверняка"

significance_alpha: 0.05        # уровень значимости для сравнений сегментов

min_sample_visits: 500          # ниже этого числа визитов различия помечаются
                                # "незначимо / мало данных"

goal_inflation_warning: 1.3     # достижения/визиты выше порога ->
                                # цель, вероятно, переотрабатывает (двойной счёт)

currency_round: 0               # округление рублёвых сумм на выводе (знаков)

manual_source_confidence_cap: "MED"   # ни одна проверка, чьи requires закрыты
                                       # источником с mode=manual, не получает
                                       # confidence=HIGH, даже при значимом p-value

crux_min_field_data: true             # если CrUX не отдал полевые данные —
                                       # находки CWV капаются в MED автоматически

transform:
  # T02/T03: carry-forward источника трафика для internal/undefined визитов
  # (см. marketing-diagnostics-methodology-v2.md §5). Сколько дней истории
  # клиента ДО data_window.date_from нужно для восстановления цепочки —
  # только контекст для resolve, в отчёт/метрики эти визиты не попадают.
  traffic_resolve_lookback_days: 30
